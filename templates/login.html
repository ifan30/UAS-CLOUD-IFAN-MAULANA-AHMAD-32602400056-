<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CV Cloud Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center font-sans">
    <div class="bg-[#1e293b] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700/50">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-emerald-400">CV Cloud Manager</h2>
            <p class="text-slate-400 text-sm mt-2">Masuk ke Panel Manajemen AWS S3</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-red-500/10 border border-red-500 text-red-400 p-3 rounded-xl mb-4 text-sm text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Admin</label>
                <input type="email" name="email" required placeholder="admin@gmail.com" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-[#0f172a] font-bold py-3 rounded-xl transition cursor-pointer shadow-lg shadow-emerald-500/20">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
