<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat CV Baru - CV Cloud Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans flex">
    <!-- Sidebar -->
    <div class="w-64 bg-[#1e293b] border-r border-slate-700/50 p-6 flex flex-col justify-between">
        <div>
            <h2 class="text-xl font-bold text-emerald-400 mb-8 tracking-wide">CV CLOUD MGR</h2>
            <nav class="space-y-2">
                <a href="/dashboard" class="block px-4 py-3 rounded-xl hover:bg-slate-700/50 text-slate-300 font-medium transition">Dashboard</a>
                <a href="/create-cv" class="block px-4 py-3 rounded-xl bg-emerald-500 text-[#0f172a] font-bold transition">Buat CV Baru</a>
                <a href="/list-cv" class="block px-4 py-3 rounded-xl hover:bg-slate-700/50 text-slate-300 font-medium transition">Direktori S3</a>
            </nav>
        </div>
        <a href="/logout" class="block text-center px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 font-semibold rounded-xl border border-red-500/30 transition">Log Out</a>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10 max-w-4xl">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-white">Form Pembuatan & Upload CV</h1>
            <p class="text-slate-400 text-sm mt-1">Isi data teks untuk otomatisasi kompilasi dokumen objek cloud S3</p>
        </header>

        <div class="bg-[#1e293b] p-8 rounded-2xl border border-slate-700/50 shadow-xl">
            <form action="/create-cv" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Nama Lengkap</label>
                        <input type="text" name="nama" required placeholder="Contoh: Ifan Nulhakim" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email</label>
                        <input type="email" name="email" required placeholder="ifan@gmail.com" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Nomor HP</label>
                        <input type="text" name="hp" required placeholder="081234567..." class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Pendidikan Terakhir</label>
                        <select name="pendidikan" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 transition">
                            <option value="D3 Manajemen Informatika">D3 Manajemen Informatika</option>
                            <option value="S1 Teknik Informatika">S1 Teknik Informatika</option>
                            <option value="S1 Sistem Informasi">S1 Sistem Informasi</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Pilih Tema Template Desain</label>
                        <select name="tema" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-emerald-500 transition">
                            <option value="Professional Navy">Professional Navy</option>
                            <option value="Modern Emerald">Modern Emerald</option>
                            <option value="Elegant Minimalist">Elegant Minimalist</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Foto Profil (Aset Multimedia)</label>
                        <input type="file" name="foto" class="w-full text-sm text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-slate-700 file:text-slate-200 hover:file:bg-slate-600 file:cursor-pointer">
                    </div>
                </div>

                <div class="pt-4 flex justify-end">
                    <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-[#0f172a] font-bold px-8 py-3 rounded-xl transition cursor-pointer shadow-lg shadow-emerald-500/10">
                        Generate & Upload Ke AWS S3
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
